services:
  app:
    build: .
    image: ghcr.io/bargheno/backend
    container_name: app
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - ${SERVER_PORT}:${SERVER_PORT}
    depends_on:
      - db

  db:
    image: postgres:17
    container_name: db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - ${DB_PORT}:${DB_PORT}
    volumes:
      - db_data:/var/lib/postgresql/data
  
  rdb:
    image: redis:7.4
    container_name: rdb
    restart: unless-stopped
    ports:
      - ${RDB_PORT}:${RDB_PORT}
    volumes:
      - rdb_data:/var/lib/redis/data
  

volumes:
  db_data:
  rdb_data: