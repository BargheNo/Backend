name: CI

on:
  push:
    branches:
      - test/installation
  pull_request:
    branches:
      - develop
    types:
      - opened
      - synchronize
      - reopened
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.4"

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        run: go test ./test/
